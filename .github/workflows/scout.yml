# Scout — Automated Property Scraper
# Runs daily at 7am Central (13:00 UTC) and can also be triggered manually.
#
# HOW IT WORKS:
#   1. GitHub spins up a free Ubuntu VM
#   2. It installs Node.js and dependencies
#   3. It runs the Reination scraper (public site, no login needed)
#   4. Results are written directly to your Vercel Postgres database
#   5. The VM shuts down — you're only charged for actual run time (~1-2 min)
#
# NOTE: PAM scraper runs locally on your Mac via LaunchAgent (7am daily).
#       GitHub only handles Reination. Add PAM back here if PAM allows GH scraping.

name: Scout — Fetch Properties

on:
  # Run on a schedule (cron syntax: minute hour day month weekday)
  # 13:00 UTC = 7:00am CT (CST) / 8:00am CDT
  schedule:
    - cron: '0 13 * * *'

  # Allow manual trigger from the GitHub Actions UI ("Run workflow" button)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scout:
    name: Scrape Reination Listings
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Check out your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install npm packages
      - name: Install dependencies
        run: npm ci

      # 4. Run the Reination scraper (public site, no browser needed)
      - name: Run Reination scraper
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: npm run scout:reination
